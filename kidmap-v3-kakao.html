<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

<script type="text/javascript" src="//dapi.kakao.com/v2/maps/sdk.js?appkey=63198357183755e8ca63357d0e604635&libraries=services"></script>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Gaegu:wght@400;700&family=Noto+Sans+KR:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
:root {
  --green: #2e8b6e;
  --green-d: #1f6b53;
  --green-pale: #e6f4ef;
  --orange: #f07040;
  --orange-pale: #fff0eb;
  --yellow: #f5c542;
  --cream: #fdf8f2;
  --warm: #ede5d8;
  --brown: #4a3728;
  --gray: #8a807a;
  --gray-light: #f2ede8;
  --white: #ffffff;
  --nav-h: 56px;
  --filter-h: 44px;
  --bottom-h: 64px;
  --shadow: 0 2px 16px rgba(74,55,40,.10);
  --shadow-up: 0 -4px 24px rgba(74,55,40,.12);
  --radius: 16px;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; overflow: hidden; background: var(--cream); }
body { font-family: 'Noto Sans KR', sans-serif; color: var(--brown); -webkit-tap-highlight-color: transparent; }

/* ───── TOP NAV ───── */
.top-nav {
  position: fixed; top: 0; left: 0; right: 0; z-index: 200;
  height: var(--nav-h);
  background: var(--white);
  border-bottom: 1px solid var(--warm);
  display: flex; align-items: center; padding: 0 16px; gap: 10px;
  box-shadow: 0 1px 8px rgba(0,0,0,.06);
}
.logo-mark {
  font-family: 'Gaegu', cursive;
  font-size: 20px; color: var(--green);
  white-space: nowrap; flex-shrink: 0;
}
.logo-mark span { color: var(--orange); }

.search-bar {
  flex: 1; display: flex; align-items: center;
  background: var(--gray-light); border-radius: 50px;
  padding: 0 14px; height: 38px; gap: 6px;
  border: 1.5px solid transparent; transition: border-color .2s, background .2s;
}
.search-bar:focus-within { border-color: var(--green); background: var(--white); }
.search-bar input {
  flex: 1; border: none; background: transparent;
  font-family: 'Noto Sans KR', sans-serif;
  font-size: 14px; color: var(--brown); outline: none;
}
.search-bar input::placeholder { color: var(--gray); }

.my-loc-btn {
  width: 38px; height: 38px; border-radius: 50%;
  background: var(--green-pale); border: none; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  font-size: 18px; flex-shrink: 0; transition: background .2s;
}
.my-loc-btn:active { background: var(--green); }

/* ───── FILTER ROW ───── */
.filter-row {
  position: fixed; top: var(--nav-h); left: 0; right: 0; z-index: 190;
  background: var(--white); border-bottom: 1px solid var(--warm);
  padding: 6px 16px; display: flex; gap: 8px;
  overflow-x: auto; scrollbar-width: none;
  -webkit-overflow-scrolling: touch;
  height: var(--filter-h); align-items: center;
}
.filter-row::-webkit-scrollbar { display: none; }

.chip {
  flex-shrink: 0; border: 1.5px solid var(--warm);
  background: var(--white); border-radius: 50px;
  padding: 5px 13px; font-size: 12.5px;
  font-family: 'Noto Sans KR', sans-serif; font-weight: 600;
  color: var(--brown); cursor: pointer; transition: all .15s; white-space: nowrap;
}
.chip.active { background: var(--green); border-color: var(--green); color: var(--white); }
.chip:active { transform: scale(.95); }

/* ───── MAIN LAYOUT ───── */
.main {
  position: fixed;
  top: calc(var(--nav-h) + var(--filter-h));
  bottom: var(--bottom-h);
  left: 0; right: 0;
  display: flex; flex-direction: column;
}

/* ───── MAP PANE ───── */
.map-pane {
  flex: 0 0 45vh;
  position: relative; overflow: hidden;
}
#kakaoMap { width: 100%; height: 100%; }

/* 지도 위 컨트롤 */
.map-controls {
  position: absolute; right: 12px; bottom: 12px; z-index: 10;
  display: flex; flex-direction: column; gap: 8px;
}
.map-ctrl-btn {
  width: 40px; height: 40px; background: var(--white);
  border: none; border-radius: 12px;
  box-shadow: 0 2px 10px rgba(0,0,0,.14);
  display: flex; align-items: center; justify-content: center;
  font-size: 18px; cursor: pointer; transition: transform .15s;
}
.map-ctrl-btn:active { transform: scale(.92); }

/* ───── DRAG HANDLE ───── */
.drag-handle {
  height: 20px; background: var(--white);
  display: flex; align-items: center; justify-content: center;
  cursor: ns-resize; flex-shrink: 0;
  border-top: 1px solid var(--warm);
}
.drag-handle-bar { width: 36px; height: 4px; background: var(--warm); border-radius: 2px; }

/* ───── LIST PANE ───── */
.list-pane {
  flex: 1; overflow-y: auto;
  -webkit-overflow-scrolling: touch;
  background: var(--cream); padding: 0 0 12px;
}
.list-pane::-webkit-scrollbar { width: 4px; }
.list-pane::-webkit-scrollbar-thumb { background: var(--warm); border-radius: 2px; }

.list-header {
  padding: 10px 16px 8px;
  display: flex; align-items: center; justify-content: space-between;
  position: sticky; top: 0; z-index: 5; background: var(--cream);
}
.list-count { font-size: 13px; color: var(--gray); font-weight: 600; }
.list-count strong { color: var(--brown); }
.list-sort {
  font-size: 12px; color: var(--gray);
  background: none; border: none; cursor: pointer;
  font-family: 'Noto Sans KR', sans-serif;
}

/* ─ Place Cards ─ */
.place-card {
  background: var(--white); border-radius: var(--radius);
  margin: 0 12px 10px; display: flex; overflow: hidden;
  box-shadow: var(--shadow); cursor: pointer;
  transition: transform .18s, box-shadow .18s;
  border: 2px solid transparent; position: relative;
}
.place-card.active { border-color: var(--green); box-shadow: 0 4px 20px rgba(46,139,110,.2); }
.place-card:active { transform: scale(.98); }

.card-thumb {
  width: 96px; flex-shrink: 0;
  display: flex; align-items: center; justify-content: center;
  font-size: 40px; position: relative;
}
.card-badge {
  position: absolute; top: 6px; left: 6px;
  font-size: 10px; font-weight: 700; padding: 2px 7px; border-radius: 20px;
}
.badge-free { background: var(--orange); color: #fff; }
.badge-cheap { background: var(--yellow); color: var(--brown); }

.card-info { flex: 1; padding: 11px 12px 11px 8px; min-width: 0; }
.card-cat { font-size: 11px; color: var(--gray); font-weight: 600; margin-bottom: 3px; }
.card-name {
  font-size: 15px; font-weight: 700; line-height: 1.3; margin-bottom: 4px;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.card-desc {
  font-size: 12px; color: var(--gray); line-height: 1.5; margin-bottom: 6px;
  display: -webkit-box; -webkit-line-clamp: 2;
  -webkit-box-orient: vertical; overflow: hidden;
}
.card-footer { display: flex; align-items: center; justify-content: space-between; gap: 6px; }
.card-price-tag { font-size: 13px; font-weight: 700; color: var(--green); }
.card-price-tag.free { color: var(--orange); }
.card-meta-row { display: flex; align-items: center; gap: 6px; }
.card-rating { font-size: 11px; color: var(--gray); }
.card-save-btn {
  position: absolute; top: 8px; right: 8px;
  background: none; border: none; font-size: 17px; cursor: pointer;
}

/* AD */
.ad-card {
  margin: 0 12px 10px; background: linear-gradient(90deg,#f5f5f5,#ebebeb);
  border-radius: var(--radius); height: 64px;
  display: flex; align-items: center; justify-content: center;
  font-size: 12px; color: #bbb; border: 1px dashed #ddd; font-style: italic;
}

/* ───── BOTTOM DETAIL SHEET ───── */
.detail-sheet {
  position: fixed; left: 0; right: 0; bottom: var(--bottom-h); z-index: 300;
  background: var(--white); border-radius: 24px 24px 0 0;
  box-shadow: var(--shadow-up);
  transform: translateY(100%);
  transition: transform .32s cubic-bezier(.32,0,.16,1);
  max-height: 78vh; overflow-y: auto;
  -webkit-overflow-scrolling: touch;
}
.detail-sheet.open { transform: translateY(0); }

.sheet-handle {
  padding: 12px; display: flex; justify-content: center;
  position: sticky; top: 0; background: var(--white); z-index: 1;
}
.sheet-handle-bar { width: 40px; height: 4px; background: var(--warm); border-radius: 2px; }
.sheet-close {
  position: absolute; top: 10px; right: 16px;
  background: var(--gray-light); border: none; border-radius: 50%;
  width: 30px; height: 30px; font-size: 16px; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
}

.sheet-content { padding: 0 20px 28px; }
.sheet-thumb {
  width: 100%; height: 150px; border-radius: var(--radius);
  display: flex; align-items: center; justify-content: center;
  font-size: 72px; margin-bottom: 14px;
}
.sheet-badge {
  display: inline-block; font-size: 12px; font-weight: 700;
  padding: 4px 12px; border-radius: 20px; margin-bottom: 8px;
}
.sheet-name { font-size: 22px; font-weight: 700; margin-bottom: 5px; }
.sheet-location { font-size: 13px; color: var(--gray); margin-bottom: 12px; }
.sheet-desc { font-size: 14px; line-height: 1.75; color: var(--brown); margin-bottom: 16px; }
.sheet-info-grid {
  display: grid; grid-template-columns: 1fr 1fr;
  gap: 10px; margin-bottom: 18px;
}
.sheet-info-item { background: var(--gray-light); border-radius: 12px; padding: 12px; }
.sheet-info-label { font-size: 11px; color: var(--gray); font-weight: 600; margin-bottom: 3px; }
.sheet-info-value { font-size: 13px; font-weight: 700; }
.sheet-actions { display: flex; gap: 10px; }
.sheet-btn {
  flex: 1; padding: 14px; border-radius: 14px; border: none;
  font-family: 'Noto Sans KR', sans-serif; font-size: 15px; font-weight: 700;
  cursor: pointer; transition: transform .15s;
}
.sheet-btn:active { transform: scale(.97); }
.sheet-btn.primary { background: var(--green); color: #fff; }
.sheet-btn.secondary { background: var(--gray-light); color: var(--brown); }

/* ───── BOTTOM NAV ───── */
.bottom-nav {
  position: fixed; bottom: 0; left: 0; right: 0; z-index: 400;
  height: var(--bottom-h); background: var(--white);
  border-top: 1px solid var(--warm); display: flex;
  box-shadow: 0 -2px 12px rgba(0,0,0,.06);
  padding-bottom: env(safe-area-inset-bottom, 0);
}
.nav-item {
  flex: 1; display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  gap: 3px; cursor: pointer; border: none; background: none;
  color: var(--gray); font-family: 'Noto Sans KR', sans-serif;
  transition: color .15s;
}
.nav-item.active { color: var(--green); }
.nav-item span { font-size: 20px; }
.nav-item small { font-size: 10px; font-weight: 600; }

/* ───── DESKTOP ───── */
@media (min-width: 768px) {
  .main { flex-direction: row; }
  .map-pane { flex: 0 0 55%; height: 100%; }
  .drag-handle { display: none; }
  .list-pane { flex: 1; border-left: 1px solid var(--warm); }
  .detail-sheet { left: 55%; border-radius: 24px 24px 0 0; }
}

/* ───── TOAST ───── */
.toast {
  position: fixed; bottom: calc(var(--bottom-h) + 16px); left: 50%;
  transform: translateX(-50%) translateY(20px);
  background: var(--brown); color: #fff;
  font-size: 13px; padding: 10px 20px; border-radius: 50px;
  z-index: 500; opacity: 0; transition: all .3s;
  pointer-events: none; white-space: nowrap;
}
.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

/* ───── OVERLAY ───── */
.overlay {
  position: fixed; inset: 0; z-index: 250;
  background: rgba(0,0,0,.3); opacity: 0;
  pointer-events: none; transition: opacity .3s;
}
.overlay.show { opacity: 1; pointer-events: all; }

/* 로딩 */
.map-loading {
  position: absolute; inset: 0; z-index: 5;
  background: #d8e8e0;
  display: flex; align-items: center; justify-content: center;
  flex-direction: column; gap: 10px;
  font-size: 14px; color: var(--green); font-weight: 600;
}
.map-loading .spin {
  font-size: 32px;
  animation: spin 1s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>

// ─────────────────────────────────────────
// 카카오맵 초기화
// ─────────────────────────────────────────
let map = null;
let markers = [];
let activeId = null;
let savedIds = new Set();
let currentFilter = 'all';
let infowindows = [];

function initMap() {
  const container = document.getElementById('kakaoMap');
  const options = {
    center: new kakao.maps.LatLng(36.5, 127.8),
    level: 13,
  };
  map = new kakao.maps.Map(container, options);
  document.getElementById('mapLoading').style.display = 'none';
  renderMarkers(PLACES);
  renderList();
}

// ─────────────────────────────────────────
// 마커 렌더링
// ─────────────────────────────────────────
function renderMarkers(places) {
  // 기존 마커 제거
  markers.forEach(m => m.setMap(null));
  infowindows.forEach(iw => iw.close());
  markers = []; infowindows = [];

  places.forEach(p => {
    const pos = new kakao.maps.LatLng(p.lat, p.lng);
    const isActive = activeId === p.id;

    // 커스텀 오버레이 (말풍선 핀)
    const color = p.free ? '#f07040' : '#2e8b6e';
    const content = `
      <div style="
        background:${isActive ? '#f5c542' : color};
        color:${isActive ? '#4a3728' : '#fff'};
        font-size:11px; font-weight:700;
        padding:5px 10px; border-radius:20px;
        box-shadow:0 2px 8px rgba(0,0,0,.25);
        white-space:nowrap; cursor:pointer;
        font-family:'Noto Sans KR',sans-serif;
        transform:${isActive ? 'scale(1.15)' : 'scale(1)'};
        transition: transform .2s;
        position:relative;
      " onclick="selectPlace(${p.id})">
        ${p.name.length > 7 ? p.name.slice(0,7)+'…' : p.name}
        <div style="
          position:absolute; bottom:-6px; left:50%;
          transform:translateX(-50%);
          border:6px solid transparent;
          border-top-color:${isActive ? '#f5c542' : color};
          border-bottom:0;
        "></div>
      </div>`;

    const overlay = new kakao.maps.CustomOverlay({
      position: pos,
      content: content,
      yAnchor: 1.35,
    });
    overlay.setMap(map);
    markers.push(overlay);
  });
}

// ─────────────────────────────────────────
// 리스트 렌더링
// ─────────────────────────────────────────
function getFiltered() {
  const q = document.getElementById('searchInput').value.trim().toLowerCase();
  return PLACES.filter(p => {
    const matchFilter = currentFilter === 'all' || p.cat === currentFilter ||
      (currentFilter === 'free' && p.free);
    const matchSearch = !q || p.name.includes(q) || p.location.includes(q) || p.desc.includes(q);
    return matchFilter && matchSearch;
  });
}

function renderList() {
  const list = getFiltered();
  document.getElementById('countNum').textContent = list.length;
  const el = document.getElementById('placeList');
  let html = '';

  list.forEach((p, i) => {
    const saved = savedIds.has(p.id);
    const active = activeId === p.id;
    if (i === 2) html += `<div class="ad-card">📣 광고 영역 (애드센스)</div>`;
    html += `
    <div class="place-card ${active ? 'active' : ''}" onclick="selectPlace(${p.id})" id="card-${p.id}">
      <div class="card-thumb" style="background:${p.bg}">
        ${p.emoji}
        <div class="card-badge ${p.free ? 'badge-free' : 'badge-cheap'}">${p.free ? '🆓 무료' : '💰 가성비'}</div>
      </div>
      <div class="card-info">
        <div class="card-cat">${p.catLabel}</div>
        <div class="card-name">${p.name}</div>
        <div class="card-desc">${p.desc}</div>
        <div class="card-footer">
          <div class="card-price-tag ${p.free ? 'free' : ''}">${p.price}</div>
          <div class="card-meta-row">
            <div class="card-rating">⭐ ${p.rating} (${p.reviews})</div>
          </div>
        </div>
      </div>
      <button class="card-save-btn" onclick="toggleSave(event,${p.id})">${saved ? '❤️' : '🤍'}</button>
    </div>`;
  });

  el.innerHTML = html;
  if (map) renderMarkers(list);
}

// ─────────────────────────────────────────
// 장소 선택
// ─────────────────────────────────────────
function selectPlace(id) {
  activeId = id;
  renderList();

  const p = PLACES.find(x => x.id === id);
  if (!p) return;

  // 지도 이동
  if (map) {
    map.panTo(new kakao.maps.LatLng(p.lat, p.lng));
    setTimeout(() => map.setLevel(5), 300);
  }

  // 바텀 시트
  document.getElementById('sheetContent').innerHTML = `
    <div class="sheet-thumb" style="background:${p.bg}">${p.emoji}</div>
    <div class="sheet-badge ${p.free ? 'badge-free' : 'badge-cheap'}">${p.free ? '🆓 완전 무료' : '💰 가성비'}</div>
    <div class="sheet-name">${p.name}</div>
    <div class="sheet-location">📍 ${p.location}</div>
    <div class="sheet-desc">${p.desc}</div>
    <div class="sheet-info-grid">
      <div class="sheet-info-item">
        <div class="sheet-info-label">💰 이용요금</div>
        <div class="sheet-info-value">${p.price}</div>
      </div>
      <div class="sheet-info-item">
        <div class="sheet-info-label">🕐 운영시간</div>
        <div class="sheet-info-value">${p.hours}</div>
      </div>
      <div class="sheet-info-item">
        <div class="sheet-info-label">🚇 교통편</div>
        <div class="sheet-info-value">${p.transport}</div>
      </div>
      <div class="sheet-info-item">
        <div class="sheet-info-label">👶 추천연령</div>
        <div class="sheet-info-value">${p.age}</div>
      </div>
    </div>
    <div class="sheet-actions">
      <button class="sheet-btn secondary" onclick="toggleSave(null,${p.id})">
        ${savedIds.has(p.id) ? '❤️ 저장됨' : '🤍 저장하기'}
      </button>
      <button class="sheet-btn primary" onclick="openKakaoNavi(${p.lat},${p.lng},'${p.name}')">
        🗺 길찾기
      </button>
    </div>
  `;
  document.getElementById('detailSheet').classList.add('open');
  document.getElementById('overlay').classList.add('show');

  const card = document.getElementById('card-'+id);
  if (card) card.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
}

function closeDetail() {
  document.getElementById('detailSheet').classList.remove('open');
  document.getElementById('overlay').classList.remove('show');
  activeId = null;
  renderList();
}

// ─────────────────────────────────────────
// 길찾기 (카카오맵 앱 연동)
// ─────────────────────────────────────────
function openKakaoNavi(lat, lng, name) {
  const url = `https://map.kakao.com/link/to/${encodeURIComponent(name)},${lat},${lng}`;
  window.open(url, '_blank');
}

// ─────────────────────────────────────────
// 필터 / 검색
// ─────────────────────────────────────────
function filterChip(el, filter) {
  document.querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
  el.classList.add('active');
  currentFilter = filter;
  activeId = null;
  renderList();
}

document.getElementById('searchInput').addEventListener('input', () => {
  activeId = null;
  renderList();
});

// ─────────────────────────────────────────
// 저장 / 내위치 / 줌
// ─────────────────────────────────────────
function toggleSave(e, id) {
  if (e) e.stopPropagation();
  if (savedIds.has(id)) { savedIds.delete(id); showToast('저장 취소했어요'); }
  else { savedIds.add(id); showToast('❤️ 저장했어요!'); }
  renderList();
  if (activeId === id) selectPlace(id);
}

function showSaved() {
  if (savedIds.size === 0) { showToast('아직 저장한 장소가 없어요'); return; }
  showToast(`❤️ 저장된 장소 ${savedIds.size}개`);
}

function moveToMyLocation() {
  if (!navigator.geolocation) { showToast('위치 권한이 필요해요'); return; }
  navigator.geolocation.getCurrentPosition(pos => {
    const latlng = new kakao.maps.LatLng(pos.coords.latitude, pos.coords.longitude);
    if (map) { map.panTo(latlng); map.setLevel(6); }
    showToast('📡 내 위치로 이동했어요!');
  }, () => showToast('위치 권한을 허용해주세요'));
}

function mapZoomIn()  { if (map) map.setLevel(map.getLevel() - 1); }
function mapZoomOut() { if (map) map.setLevel(map.getLevel() + 1); }

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2200);
}

// ─────────────────────────────────────────
// 카카오맵 로드 완료 후 초기화
// ─────────────────────────────────────────
kakao.maps.load(initMap);
</script>
